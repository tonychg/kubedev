apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  destination:
    name: in-cluster
    namespace: argocd
  sources:
    - repoURL: https://github.com/tonychg/kubedev.git
      targetRevision: master
      ref: app
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.5.3
      helm:
        skipCrds: false
        valueFiles:
          - $app/services/argocd/values.yaml
    - repoURL: https://github.com/tonychg/kubedev.git
      path: argocd/services.yaml
      directory:
        recurse: false
